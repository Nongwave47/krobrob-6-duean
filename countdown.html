<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown ของเรา ⏳</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700&display=swap" rel="stylesheet">

<style>
/* Reset & font */
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Kanit', sans-serif;
  background: #e0f7ff url('images/dora-bg.png') repeat;
  background-size: 150px;
  color: #03396c;
  min-height:100vh;
  
}

/* ปิด scrollbars ทั้งแนวตั้งและแนวนอน */
html, body {
  overflow: hidden;
}
/* Header */
header {
  text-align: center;
  padding: 50px 20px;
  background: linear-gradient(135deg, #42a5f5, #81d4fa);
  color: #fff;
  border-bottom: 5px solid #0d47a1;
}
header h1 { font-size: 2.8em; margin-bottom:10px; }
header .subtitle { font-size: 1.2em; margin-top: -4px; }

/* Grid container for countdown events */
.grid-container {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
  gap: 20px;
  max-width: 1000px;
  margin: 40px auto;
  padding: 0 10px;
}

/* Countdown cards */
.event-card {
  background: #b3e5fc;
  border: 3px solid #42a5f5;
  border-radius: 15px;
  padding: 25px 20px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
  transition: transform 0.3s;
  text-align:center;
}
.event-card:hover { transform: translateY(-5px); }
.event-card h2 { font-size: 22px; margin-bottom: 12px; color:#0d47a1; }
.event-card p { font-size: 18px; font-weight:600; color:#03396c; }

/* Navbar / buttons */
.nav-buttons {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin: 50px 0 30px;
}
.nav-btn {
  padding: 14px 32px;
  border-radius: 50px;
  background: linear-gradient(135deg,#ffd700,#ffeb3b);
  color:#0d47a1;
  text-decoration: none;
  font-weight:700;
  box-shadow: 0 6px 15px rgba(0,0,0,0.2);
  transition: transform 0.25s, box-shadow 0.25s;
}
.nav-btn:hover {
  transform: scale(1.08) translateY(-2px);
  box-shadow:0 14px 32px rgba(0,0,0,0.35);
}

/* Doraemon corners */
.dora-left, .dora-right {
  position: fixed;
  width: 18vw; max-width: 220px; min-width: 100px;
  height: auto;
  z-index: 1000;
}
.dora-left { left: 0; bottom: 0; }
.dora-right { right: 0; bottom: 0; }

/* Confetti canvas */
canvas { position: fixed; top:0; left:0; pointer-events:none; z-index:9999; }

/* Floating hearts */
.heart{
  position:absolute;
  width:15px;
  height:15px;
  background:#fff;
  transform:rotate(45deg);
  bottom:-40px;
  animation:floatUp 6s linear infinite;
  opacity:0.8;
}
.heart:before,
.heart:after{
  content:"";
  position:absolute;
  width:15px;
  height:15px;
  background:#fff;
  border-radius:50%;
}
.heart:before{top:-8px;left:0;}
.heart:after{left:8px;top:0;}
@keyframes floatUp{
0%{transform:translateY(0) rotate(45deg);opacity:0.8}
100%{transform:translateY(-700px) rotate(45deg);opacity:0}
}

/* Responsive */
@media(max-width:768px){
  .grid-container{ grid-template-columns: 1fr; }
  header h1{ font-size:2em; }
  .event-card h2{ font-size:20px; }
  .event-card p{ font-size:16px; }
}

</style>
</head>

<body>

<header>
<h1>Countdown ของเรา ⏳</h1>
<div class="subtitle">พี่รอวันที่เราจะได้เจอกันจริง ๆ 💙</div>
</header>

<!-- Countdown events -->
<div class="grid-container" id="events-container"></div>

<!-- Navbar -->
<div class="nav-buttons">
<a href="gallery.html" class="nav-btn">⬅️ ย้อนกลับ</a>
<a href="minigame.html" class="nav-btn">ถัดไป ➡️</a>
</div>

<!-- Doraemon images -->
<img src="doraemon10.png" class="dora-left">
<img src="doraemon11.png" class="dora-right">

<!-- Confetti -->
<canvas id="confetti"></canvas>

<script>
// Countdown events
const events = [
{ name:"ครบรอบ 7 เดือน 💙", date:new Date(2026,3,12) },
{ name:"วันเกิดของหนู 🎂", date:new Date(2026,5,28) },
{ name:"ครบรอบ 1 ปี 💖", date:new Date(2026,8,12) },
{ name:"ครบรอบ 2 ปี 💕", date:new Date(2027,8,12) },
{ name:"ครบรอบ 5 ปี 💕", date:new Date(2030,8,12) },
{ name:"ครบรอบ 10 ปี 💕", date:new Date(2035,8,12) },

];

function updateEvents(){
  const container=document.getElementById("events-container");
  container.innerHTML="";
  const now=new Date();

  events.forEach(event=>{
    const diff=event.date-now;
    let text;
    if(diff<=0){
      const passed=Math.floor(Math.abs(diff)/(1000*60*60*24));
      text=`ผ่านมาแล้ว ${passed} วัน 💙`;
    }else{
      const days=Math.floor(diff/(1000*60*60*24));
      const hours=Math.floor((diff/(1000*60*60))%24);
      text=`เหลืออีก ${days} วัน ${hours} ชม`;
    }
    const div=document.createElement("div");
    div.className="event-card";
    div.innerHTML=`<h2>${event.name}</h2><p>${text}</p>`;
    container.appendChild(div);
  });
}

setInterval(updateEvents,1000);
updateEvents();

// Floating hearts
function createHeart(){
  const heart=document.createElement('div');
  heart.classList.add('heart');
  heart.style.left=Math.random()*100+'vw';
  heart.style.width=heart.style.height=(10+Math.random()*15)+'px';
  heart.style.animationDuration=(4+Math.random()*4)+'s';
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),5000);
}
setInterval(createHeart,400);

// Confetti animation
const canvas=document.getElementById('confetti');
const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const confettiCount=120;
const confetti=[];
const colors=['#42a5f5','#ffd700','#f44336','#ffffff'];

function random(min,max){ return Math.random()*(max-min)+min; }

for(let i=0;i<confettiCount;i++){
  confetti.push({
    x:random(0,canvas.width),
    y:random(0,canvas.height),
    r:random(5,15),
    d:random(1,10),
    color:colors[Math.floor(random(0,colors.length))],
    tilt:random(-10,10),
    tiltAngleIncrement:random(0.05,0.12),
    tiltAngle:0
  });
}

function drawConfetti(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  confetti.forEach(c=>{
    ctx.beginPath();
    ctx.lineWidth=c.r/2;
    ctx.strokeStyle=c.color;
    ctx.moveTo(c.x+c.tilt+c.r/4,c.y);
    ctx.lineTo(c.x+c.tilt,c.y+c.tilt+c.r/4);
    ctx.stroke();
  });
  confetti.forEach(c=>{
    c.tiltAngle+=c.tiltAngleIncrement;
    c.y+=(Math.cos(c.d)+1+c.r/2)/2;
    c.tilt=Math.sin(c.tiltAngle)*15;
    if(c.y>canvas.height){
      c.y=-10;
      c.x=random(0,canvas.width);4
    }
  });
  requestAnimationFrame(drawConfetti);
}
drawConfetti();

window.addEventListener('resize',()=>{
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
});
</script>

</body>
</html>
