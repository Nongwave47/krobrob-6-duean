<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>จบแล้ว 💖</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Kanit',sans-serif;
  background:#e0f7ff url('images/dora-bg.png') repeat;
  background-size:150px;
  color:#03396c;
  min-height:100vh;
  overflow:hidden;
  text-align:center;
}

/* Header */
header{
  text-align:center;
  padding:50px 20px;
  background:linear-gradient(135deg,#42a5f5,#81d4fa);
  color:white;
  border-bottom:5px solid #0d47a1;
}
header h1{font-size:2.8em;margin-bottom:10px;}
header p{font-size:1.2em;opacity:0.9;}

/* Content box */
#endContainer{
  max-width:700px;
  margin:40px auto;
  background:rgba(255,255,255,0.9);
  border:3px solid #42a5f5;
  border-radius:15px;
  padding:40px 25px;
  box-shadow:0 8px 20px rgba(0,0,0,0.1);
  animation:slideDown 0.7s forwards;
}

/* Slide down animation */
@keyframes slideDown{
  from {opacity:0; transform:translateY(-50px);}
  to {opacity:1; transform:translateY(0);}
}

/* Buttons */
.endBtns{
  margin-top:30px;
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
}
.endBtns a{
  padding:12px 30px;
  border-radius:50px;
  background:linear-gradient(135deg,#ffd700,#ffeb3b);
  font-weight:700;
  text-decoration:none;
  color:#0d47a1;
  transition:transform 0.25s,box-shadow 0.25s;
}
.endBtns a:hover{
  transform:scale(1.08) translateY(-2px);
  box-shadow:0 14px 32px rgba(0,0,0,0.35);
}

/* Footer message box */
#finalMessage{
  margin-top:35px;
  padding:25px 20px;
  border:2px dashed #42a5f5;
  border-radius:15px;
  background:rgba(255,255,255,0.8);
  font-size:1.2em;
  color:#0d47a1;
  font-weight:600;
  line-height:1.6;
  box-shadow:0 6px 12px rgba(0,0,0,0.1);
  animation:fadeIn 1s forwards;
}
@keyframes fadeIn{
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1; transform:translateY(0);}
}

/* Doraemon corners */
.dora-left,.dora-right{
  position:fixed;
  width:18vw; max-width:220px; min-width:100px;
  height:auto;
  z-index:1000;
}
.dora-left{left:0; bottom:0;}
.dora-right{right:0; bottom:0;}

/* Floating hearts */
.heart{
  position:absolute;
  width:15px;
  height:15px;
  background:#fff;
  transform:rotate(45deg);
  bottom:-40px;
  animation:floatUp 6s linear infinite;
  opacity:0.8;
}
.heart:before,.heart:after{
  content:"";
  position:absolute;
  width:15px; height:15px;
  background:#fff;
  border-radius:50%;
}
.heart:before{top:-8px;left:0;}
.heart:after{left:8px;top:0;}
@keyframes floatUp{
0%{transform:translateY(0) rotate(45deg);opacity:0.8}
100%{transform:translateY(-700px) rotate(45deg);opacity:0}
}

.endBtns{
  margin-top:25px;
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
}
.endBtns a{
  padding:12px 30px;
  border-radius:50px;
  background:linear-gradient(135deg,#ffd700,#ffeb3b);
  font-weight:700;
  text-decoration:none;
  color:#0d47a1;
  transition:transform 0.25s,box-shadow 0.25s;
}
.endBtns a:hover{
  transform:scale(1.08) translateY(-2px);
  box-shadow:0 14px 32px rgba(0,0,0,0.35);
}
/* Confetti canvas */
canvas{position:fixed;top:0;left:0;pointer-events:none;z-index:9999;}
</style>
</head>
<body>

<header>
<h1>🎉 จบแล้ว! 🎉</h1>
<p>ขอบคุณที่เล่น Quiz กับเรานะ 💖</p>
</header>

<div id="endContainer">
  <h2 style="font-size:2em; color:#0d47a1; margin-bottom:20px;">มีอารายจาบอกกกกก</h2>
  
  <!-- กล่องข้อความทิ้งท้าย -->
  <div id="finalMessage">
    💌 ขอบคุณสำหรับทุกช่วงเวลาที่เราได้แชร์กันนะ  
    ไม่ว่าจะหัวเราะหรือเขิน เราก็ได้เก็บความทรงจำดี ๆ ไว้ด้วยกันเสมอ  
    ขอให้ความรักและความสนุกของเรายังคงอยู่ต่อไป 💖
  </div>

</div>
 <!-- ปุ่มด้านล่างกล่อง -->
  <div class="endBtns">
    <a href="quiz.html">⬅️ กลับหน้าก่อน</a>
    <a href="index.html">🏠 กลับหน้าแรก</a>
  </div>
</div>

<img src="doraemon16.png" class="dora-left">
<img src="doraemon17.png" class="dora-right">

<canvas id="confetti"></canvas>

<script>
// Floating hearts
function createHeart(){
  const heart=document.createElement('div');
  heart.classList.add('heart');
  heart.style.left=Math.random()*100+'vw';
  heart.style.width=heart.style.height=(10+Math.random()*15)+'px';
  heart.style.animationDuration=(4+Math.random()*4)+'s';
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),5000);
}
setInterval(createHeart,400);

// Confetti
const canvas=document.getElementById('confetti');
const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const confettiCount=120;
const confetti=[];
const colors=['#42a5f5','#ffd700','#f44336','#ffffff'];

function random(min,max){return Math.random()*(max-min)+min;}

for(let i=0;i<confettiCount;i++){
  confetti.push({
    x:random(0,canvas.width),
    y:random(-canvas.height,0),
    r:random(5,15),
    d:random(1,10),
    color:colors[Math.floor(random(0,colors.length))],
    tilt:random(-10,10),
    tiltAngleIncrement:random(0.05,0.12),
    tiltAngle:0
  });
}

function drawConfetti(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  confetti.forEach(c=>{
    ctx.beginPath();
    ctx.lineWidth=c.r/2;
    ctx.strokeStyle=c.color;
    ctx.moveTo(c.x+c.tilt+c.r/4,c.y);
    ctx.lineTo(c.x+c.tilt,c.y+c.tilt+c.r/4);
    ctx.stroke();
  });
  confetti.forEach(c=>{
    c.tiltAngle+=c.tiltAngleIncrement;
    c.y+=(Math.cos(c.d)+1+c.r/2)/2;
    c.tilt=Math.sin(c.tiltAngle)*15;
    if(c.y>canvas.height){ c.y=-10; c.x=random(0,canvas.width); }
  });
  requestAnimationFrame(drawConfetti);
}
drawConfetti();

window.addEventListener('resize',()=>{canvas.width=window.innerWidth; canvas.height=window.innerHeight;});
</script>

</body>
</html>
