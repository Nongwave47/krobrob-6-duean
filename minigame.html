<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Game 💖 – จับคู่คำรัก</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Kanit',sans-serif;
  background:#e0f7ff url('images/dora-bg.png') repeat;
  background-size:150px;
  color:#03396c;
  overflow-x:hidden;
}

/* Header */
header{
  text-align:center;
  padding:40px 20px;
  background:linear-gradient(135deg,#42a5f5,#81d4fa);
  color:white;
  border-bottom:5px solid #0d47a1;
}
header h1{font-size:2.5em;margin-bottom:10px;}
header p{font-size:1.1em;}

/* Game board */
.board{
  max-width:600px;
  margin:40px auto;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
}

.card{
  background:#b3e5fc;
  border:3px solid #42a5f5;
  border-radius:15px;
  padding:25px;
  font-size:1.3em;
  font-weight:700;
  text-align:center;
  cursor:pointer;
  transition: transform 0.3s, background 0.3s;
}

.card.flipped, .card.matched{
  background:#ffeb3b;
  transform: scale(1.05);
}

/* Buttons */
.bottom-btn{
  text-align:center;
  margin:40px 0;
}

.button{
  display:inline-block;
  background:linear-gradient(135deg,#ffd700,#ffeb3b);
  color:#0d47a1;
  padding:12px 28px;
  border-radius:50px;
  font-weight:700;
  text-decoration:none;
  box-shadow:0 6px 15px rgba(0,0,0,0.2);
  transition:0.3s;
  margin:10px;
}

.button:hover{
  transform:scale(1.08);
}

/* Doraemon corners */
.dora-left,.dora-right{
  position:fixed;
  bottom:0;
  width:18vw;
  max-width:220px;
  min-width:100px;
  height:auto;
  z-index:1000;
}
.dora-left{left:0;}
.dora-right{right:0;}

/* Confetti */
canvas{position:fixed;top:0;left:0;pointer-events:none;z-index:9999;}

/* Responsive */
@media(max-width:768px){
  .board{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<header>
  <h1>Mini Game 💖</h1>
  <p>จับคู่คำรักให้ถูกต้อง! ✨</p>
</header>

<div class="board" id="gameBoard">
  <!-- Cards จะสร้างโดย JS -->
</div>

<div class="bottom-btn">
  <a href="countdown.html" class="button">⬅️ ย้อนกลับ</a>
  <a href="quiz.html" class="button">หน้าถัดไป ➡️</a>
</div>

<img src="doraemon14.png" class="dora-left">
<img src="doraemon15.png" class="dora-right">

<canvas id="confetti"></canvas>

<script>
// --------------------
// Mini Game Logic
// --------------------
const words = [
  {pair:"รัก", id:1},{pair:"Love", id:1},
  {pair:"คิดถึง", id:2},{pair:"Miss", id:2},
  {pair:"แฟน", id:3},{pair:"Girlfriend", id:3},
  {pair:"หัวใจ", id:4},{pair:"Heart", id:4}
];

let cards = [...words];
cards.sort(()=>Math.random()-0.5);

const board = document.getElementById("gameBoard");

cards.forEach(card=>{
  const div = document.createElement("div");
  div.className="card";
  div.dataset.id = card.id;
  div.innerText=card.pair;
  board.appendChild(div);
});

let flipped = [];
let matched = [];

board.addEventListener("click",e=>{
  const card = e.target;
  if(!card.classList.contains("card") || card.classList.contains("flipped") || card.classList.contains("matched")) return;

  card.classList.add("flipped");
  flipped.push(card);

  if(flipped.length===2){
    if(flipped[0].dataset.id === flipped[1].dataset.id){
      flipped.forEach(c=>c.classList.add("matched"));
      matched.push(...flipped);
      triggerConfetti();
    }
    setTimeout(()=>flipped.forEach(c=>c.classList.remove("flipped")),800);
    flipped=[];
  }

  if(matched.length===cards.length){
    setTimeout(()=>alert("ยินดีด้วย! คุณจับคู่สำเร็จ 💖"),500);
  }
});

// --------------------
// Confetti effect
// --------------------
const canvas = document.getElementById('confetti');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const confettiCount = 100;
const confetti = [];
const colors = ['#42a5f5','#ffd700','#f44336','#ffffff'];

function random(min,max){return Math.random()*(max-min)+min;}

for(let i=0;i<confettiCount;i++){
  confetti.push({
    x: random(0,canvas.width),
    y: random(0,canvas.height),
    r: random(5,10),
    d: random(1,10),
    color: colors[Math.floor(random(0,colors.length))],
    tilt: random(-10,10),
    tiltAngleIncrement: random(0.05,0.12),
    tiltAngle:0
  });
}

function drawConfetti(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  confetti.forEach(c=>{
    ctx.beginPath();
    ctx.lineWidth = c.r/2;
    ctx.strokeStyle = c.color;
    ctx.moveTo(c.x+c.tilt+c.r/4,c.y);
    ctx.lineTo(c.x+c.tilt,c.y+c.tilt+c.r/4);
    ctx.stroke();
  });
  updateConfetti();
  requestAnimationFrame(drawConfetti);
}

function updateConfetti(){
  confetti.forEach(c=>{
    c.tiltAngle+=c.tiltAngleIncrement;
    c.y+=(Math.cos(c.d)+1+c.r/2)/2;
    c.tilt=Math.sin(c.tiltAngle)*15;
    if(c.y>canvas.height){
      c.y=-10;
      c.x=random(0,canvas.width);
    }
  });
}

function triggerConfetti(){
  for(let i=0;i<30;i++){
    confetti.push({
      x: random(0,canvas.width),
      y: canvas.height/2,
      r: random(5,10),
      d: random(1,10),
      color: colors[Math.floor(random(0,colors.length))],
      tilt: random(-10,10),
      tiltAngleIncrement: random(0.05,0.12),
      tiltAngle:0
    });
  }
}

drawConfetti();

window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});

</script>

</body>
</html>
