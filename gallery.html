<title>ความทรงจำของเรา 📷</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
html, body {
  font-family:'Kanit',sans-serif;
  background:#e0f7ff url('images/dora-bg.png') repeat;
  background-size:150px;
  color:#03396c;
  height: 100%;
}

/* Header */
header{
  text-align:center;
  padding:50px 20px;
  background:linear-gradient(135deg,#42a5f5,#81d4fa);
  color:white;
  border-bottom:5px solid #0d47a1;
  position: relative;
  z-index: 2;
}
header h1{
  font-size:2.5em;
  margin-bottom:10px;
}
header p{
  font-size:1.1em;
  opacity:0.9;
}

/* Gallery grid */
.gallery{
  max-width:1000px;
  margin:auto;
  padding:40px 20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:40px;
  position: relative;
  z-index: 2;
}

/* Polaroid */
.polaroid{
  background:white;
  padding:12px 12px 35px 12px;
  border-radius:8px;
  box-shadow:0 10px 20px rgba(0,0,0,0.2);
  transform:rotate(-2deg);
  transition:0.4s ease;
  cursor:pointer;
  text-align:center;
}
.polaroid:nth-child(even){
  transform:rotate(2deg);
}
.polaroid:hover{
  transform:scale(1.05) rotate(0deg);
  box-shadow:0 15px 35px rgba(0,0,0,0.35);
}
.polaroid img{
  width:100%;
  border-radius:5px;
}
.caption{
  margin-top:10px;
  font-size:0.95em;
  color:#333;
}

/* Lightbox */
.lightbox{
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}
.lightbox img{
  max-width:90%;
  max-height:80%;
  border-radius:10px;
  box-shadow:0 20px 40px rgba(0,0,0,0.5);
}

/* Buttons */
.button{
  display:inline-block;
  background:linear-gradient(135deg,#ffd700,#ffeb3b);
  color:#0d47a1;
  padding:12px 28px;
  border-radius:50px;
  font-weight:700;
  text-decoration:none;
  box-shadow:0 6px 15px rgba(0,0,0,0.2);
  transition:0.3s;
  margin:10px;
}
.button:hover{
  transform:scale(1.08);
}

/* Bottom buttons */
.bottom-btn{
  text-align:center;
  margin:40px 0;
  position: relative;
  z-index:2;
}

/* Doraemon */
.dora-left,.dora-right{
  position:fixed;
  bottom:0;
  width:18vw;
  max-width:220px;
  min-width:100px;
  height:auto;
  z-index:1;
}
.dora-left{left:0;}
.dora-right{right:0;}

/* Confetti */
canvas{ position:fixed; top:0; left:0; pointer-events:none; z-index:0; }

</style>
</head>

<body>

<script>
/* Lightbox */
const images=document.querySelectorAll(".polaroid img");
const lightbox=document.getElementById("lightbox");
const lightboxImg=document.getElementById("lightbox-img");

images.forEach(img=>{
  img.addEventListener("click",()=>{
    lightbox.style.display="flex";
    lightboxImg.src=img.src;
  });
});

lightbox.addEventListener("click",()=>{
  lightbox.style.display="none";
});

/* Confetti animation */
const canvas = document.createElement('canvas');
document.body.appendChild(canvas);
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const ctx = canvas.getContext('2d');

const confettiCount = 120;
const confetti = [];
const colors = ['#42a5f5','#ffd700','#f44336','#ffffff'];

function random(min,max){ return Math.random()*(max-min)+min; }

for(let i=0;i<confettiCount;i++){
  confetti.push({
    x: random(0,canvas.width),
    y: random(0,canvas.height),
    r: random(5,15),
    d: random(1,10),
    color: colors[Math.floor(random(0,colors.length))],
    tilt: random(-10,10),
    tiltAngleIncrement: random(0.05,0.12),
    tiltAngle:0
  });
}

function drawConfetti(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  confetti.forEach(c=>{
    ctx.beginPath();
    ctx.lineWidth = c.r/2;
    ctx.strokeStyle = c.color;
    ctx.moveTo(c.x + c.tilt + c.r/4, c.y);
    ctx.lineTo(c.x + c.tilt, c.y + c.tilt + c.r/4);
    ctx.stroke();
    c.tiltAngle += c.tiltAngleIncrement;
    c.y += (Math.cos(c.d)+1+c.r/2)/2;
    c.tilt = Math.sin(c.tiltAngle)*15;
    if(c.y>canvas.height){ c.y=-10; c.x=random(0,canvas.width); }
  });
  requestAnimationFrame(drawConfetti);
}
drawConfetti();

window.addEventListener('resize', ()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>
